name: AI Scam Shield CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Rule Engine unit tests
      run: |
        pytest tests/test_rule_engine.py -v

    - name: Verify model files exist
      run: |
        python3 -c "
        import os
        files = [
          'models/scam_classifier.pkl',
          'models/tfidf_vectorizer.pkl',
          'models/metrics.json'
        ]
        for f in files:
          status = 'OK' if os.path.exists(f) else 'MISSING'
          print(f'{f}: {status}')
        "

    - name: Verify all engine imports work
      run: |
        python3 -c "
        from app.engines.rule_engine import analyze_text
        from app.engines.url_engine import analyze_url
        from app.engines.upi_engine import analyze_upi
        from app.engines.risk_scorer import calculate_risk
        print('All engine imports: OK')
        r = analyze_text('Enter your UPI PIN to receive Rs 500')
        print(f'Rule engine score: {r[\"score\"]}')
        assert r['score'] >= 70
        print('Engine smoke test: PASSED')
        "
